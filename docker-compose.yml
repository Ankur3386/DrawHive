version: '3.8'
services:
  postgres:
    image: postgres
    ports:
     - "5432:5432"
    environment:
     - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
  timescale_db:
    image: timescale/timescaledb-ha:pg18
    ports:
     - "5433:5432"
    environment:
     - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}   

  http:
    build:
      context: ./
      dockerfile: docker/Dockerfile.http
    environment:
       DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
       JWT_SECRET: ${JWT_SECRET}     
    ports:
     - "3005:3005"
    depends_on:
     - postgres 
     - timescale_db    
  ws:
    build:
      context: ./
      dockerfile: docker/Dockerfile.ws
    environment:
       DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
       JWT_SECRET: ${JWT_SECRET}  
    ports:
     - "8080:8080"
    depends_on:
     - postgres
     - timescale_db  
  front:
    build:
      context: ./
      dockerfile: docker/Dockerfile.fe
    ports:
     - "3000:3000"
    environment:
     - NEXT_PUBLIC_BACKEND_URL=http://localhost:3005/v1/user
     - NEXT_PUBLIC_WS_URL=ws://localhost:8080 
    depends_on:
     - http
     - ws   
