version: '3.8'
services:
  postgres:
    image: postgres
    ports:
     - "5432:5432"
    environment:
     - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
 
  redis:
    image: redis
    ports:
     - "6379:6379"
      
  http:
    build:
      context: ./
      dockerfile: docker/Dockerfile.http
    restart: unless-stopped  
    environment:
       DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
       JWT_SECRET: ${JWT_SECRET}     
    ports:
     - "3005:3005"
    depends_on:
     - postgres 
    
      
  ws:
    build:
      context: ./
      dockerfile: docker/Dockerfile.ws
    restart: unless-stopped  
    environment:
       DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
       REDIS_URL: redis://redis:6379
       JWT_SECRET: ${JWT_SECRET}  
       
    ports:
     - "8080:8080"
    depends_on:
     - postgres
     - redis
  front:
    build:
      context: ./
      dockerfile: docker/Dockerfile.fe
      args:
       - NEXT_PUBLIC_BACKEND_URL=http://localhost:3005/v1/user
       - NEXT_PUBLIC_WS_URL=ws://localhost:8080 
    ports:
     - "3000:3000"
    depends_on:
     - http
     - ws   
