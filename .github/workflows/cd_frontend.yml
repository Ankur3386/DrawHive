name: deploy
on:
  push:
    branches:
     - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
     - name: checkout
       uses: actions/checkout@v4
     - name: dockerhub-login
       uses: docker/login-action@v4
       with:
         username: ${{secrets.DOCKERHUB_USERNAME}}
         password: ${{secrets.DOCKERHUB_TOKEN}}
     - name: build-and-deploy
       uses: docker/build-push-action@v3
       with:
         context: .
         file: Dockerfile.fe 
         push: true
         tags: ${{secrets.DOCKERHUB_USERNAME}}/drawhive-fe:${{github.sha}}
     - name: deploy
       uses: appleboy/ssh-action@v1.0.3
       with:
         host: ${{secrets.VM_IP}}
         key: ${{secrets.key}}
         username: ubuntu
         script: |
            docker pull ${{secrets.DOCKERHUB_USERNAME}}/drawhive-fe:${{github.sha}}
            docker  network create drawhive-network || true
            docker stop drawhive-fe || true
            docker rm drawhive-fe || true
            docker run -d \
            --name drawhive-fe \
            --network drawhive-network \
            -e NEXT_PUBLIC_BACKEND_URL=${{secrets.NEXT_PUBLIC_BACKEND_URL}} \
            -e NEXT_PUBLIC_WS_URL=${{secrets.NEXT_PUBLIC_WS_URL}} \
            ${{secrets.DOCKERHUB_USERNAME}}/drawhive-fe:${{github.sha}}