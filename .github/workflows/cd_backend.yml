name: deploy
on:
  push:
    branches:
     - main
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
     - name: checkout
       uses: actions/checkout@v4
     - name: login-docker
       uses: docker/login-action@v4
       with:
         username: ${{secrets.DOCKERHUB_USERNAME}}
         password: ${{secrets.DOCKERHUB_TOKEN}}
     - name: build-and-push-image
       uses: docker/build-push-action@v3
       with:
         context: .
         file: docker/Dockerfile.http
         push: true
         tags: ${{secrets.DOCKERHUB_USERNAME}}/drawhive-http:${{github.sha}}
     - name: deploy
       uses: appleboy/ssh-action@v1.0.3
       with:
         host: ${{secrets.VM_IP}}
         username: ubuntu
         key: ${{secrets.key}}
         script: |
           docker pull  ${{secrets.DOCKERHUB_USERNAME}}/drawhive-http:${{github.sha}}
           docker network create drawhive-network || true
           docker stop drawhive-http || true
           docker rm drawhive-http || true
           docker run -d \
           --name drawhive-http \
           --network drawhive-network \
           -e DATABASE_URL="${{secrets.DATABASE_URL}}" \
           -e JWT_SECRET="${{secrets.JWT_SECRET}}" \
           ${{secrets.DOCKERHUB_USERNAME}}/drawhive-http:${{github.sha}}


